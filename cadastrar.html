<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body class="loginEcadastro-body">
    <main class="loginEcadastro-main">
        <div class="ladoImg">
            <img>
        </div>
        <div class="ladoConteudo">
            <h1 class="loginEcadastro-titulo">Crie sua conta</h1>
            <h2 class="loginEcadastro-subtitulo">Crie sua conta e comece a usar SafeNest.</h2>
            <form class="loginEcadastro-form">
                <label class="loginEcadastro-label">insira o seu email</label>
                <input class="loginEcadastro-input" type="email" placeholder="email123@email.com">
                <svg class="loginEcadastro-icon-email" xmlns="http://www.w3.org/2000/svg" height="30px" viewBox="0 -960 960 960" width="30px" fill="#757575"><path d="M367-527q-47-47-47-113t47-113q47-47 113-47t113 47q47 47 47 113t-47 113q-47 47-113 47t-113-47ZM160-160v-112q0-34 17.5-62.5T224-378q62-31 126-46.5T480-440q66 0 130 15.5T736-378q29 15 46.5 43.5T800-272v112H160Zm80-80h480v-32q0-11-5.5-20T700-306q-54-27-109-40.5T480-360q-56 0-111 13.5T260-306q-9 5-14.5 14t-5.5 20v32Zm296.5-343.5Q560-607 560-640t-23.5-56.5Q513-720 480-720t-56.5 23.5Q400-673 400-640t23.5 56.5Q447-560 480-560t56.5-23.5ZM480-640Zm0 400Z"/></svg>
                <label class="loginEcadastro-label">crie sua senha</label>
                <input class="loginEcadastro-input" id="senha-login" type="password" placeholder="••••••••">
                <img onclick="alterarVisibilidade('olho-login','senha-login')" id="olho-login" class="loginEcadastro-icon-senha" src="imagens/olhoFechado.svg" height="30px" height="30px">
                <label class="loginEcadastro-label">confirme sua senha</label>
                <input class="loginEcadastro-input" id="senha-confirmarSenha" type="password" placeholder="••••••••">
                <img onclick="alterarVisibilidade('olho-confirmarSenha','senha-confirmarSenha')" id="olho-confirmarSenha" class="loginEcadastro-icon-confirmarSenha" src="imagens/olhoFechado.svg" height="30px" height="30px">
                <div class="loginEcadastro-centralizar-botaoLoginEcadastro">
                    <button class="loginEcadastro-botao">Criar conta</button>
                </div>
            </form>
            <p class="loginEcadastro-textinhoTroca">Já tem uma conta?<span class="loginEcadastro-trocaPag" onclick="location.href ='entrar.html'"> Faça login.</span></p>
        </div>
    </main>
</body>
<script src="script.js"></script>
</html>
