<body>
    <main class="login-main">
        <div class="ladoImg">
            <img>

        <div class="ladoConteudo">
            <h1 class="login-titulo">Entre na sua conta</h1>
            <h2 class="login-subtitulo">Bem-vindo de volta! Faça login e continue tendo sua residência protegida.</h2>
            <form class="login-form">
                <label class="login-label">insira o seu email</label>
                <input class="login-input" type="email" placeholder="email123@email.com">
                <svg class="login-icon-email" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#757575"><path d="M367-527q-47-47-47-113t47-113q47-47 113-47t113 47q47 47 47 113t-47 113q-47 47-113 47t-113-47ZM160-160v-112q0-34 17.5-62.5T224-378q62-31 126-46.5T480-440q66 0 130 15.5T736-378q29 15 46.5 43.5T800-272v112H160Zm80-80h480v-32q0-11-5.5-20T700-306q-54-27-109-40.5T480-360q-56 0-111 13.5T260-306q-9 5-14.5 14t-5.5 20v32Zm296.5-343.5Q560-607 560-640t-23.5-56.5Q513-720 480-720t-56.5 23.5Q400-673 400-640t23.5 56.5Q447-560 480-560t56.5-23.5ZM480-640Zm0 400Z"/></svg>
                <label class="login-label">insira sua senha</label>
                <input class="login-input" id="senha" type="password" placeholder="••••••••">
                <img onclick="alterarVisibilidade()" id="olho" class="login-icon-senha" src="imagens/olhoFechado.svg" height="24px" height="24px">
                
                <button class="login-botao">Fazer login</button>
            </form>
            <p class="login-textinhoTroca">Ainda não tem uma conta?<span class="login-trocaPag" onclick="location.href ='cadastrar.html'"> Faça cadastro.</span></p>
        </div>
    </main>
</body>
<script src="script.js"></script>
</html>
