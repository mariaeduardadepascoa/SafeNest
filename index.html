<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeNest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="inicial-page">
        <header class="header">
            <div id="logo"><img src="imagens/image-removebg-preview (3).png" alt="Logo do SafeNest"></div>
            <div id="links-header">
                <a href="#recursos">Recursos</a>
                <a href="#comece-a-usar">Comece a usar</a>
                <a href="#sobre-nos">Sobre nós</a>
            </div>
            <div id="buttons-header">
                <button id="button-login-header" onclick="abrirPaginaLogin()">Entrar</button>
                <button id="buttons-cadastro" onclick="abrirPaginaCadastro()">Cadastre-se</button>
            </div>
        </header>
        <div class="conjuntoDivsInicio">
            <div id="titulo-inicial-page">Sua casa, <span>protegida.</span></div>
            <div id="subtitulo-inicial-page">
                <span>O SafeNest é o sistema de segurança residencial inteligente que monitora, alerta e protege sua família 24 horas por dia.</span>
            </div>    
            <div class="buttonsInicialPage">
                <button id="buttons-cadastro" onclick="abrirPaginaCadastro()">Começar agora<img src="imagens/External link.svg" alt="Ícone branco de link externo"></button>
                <button id="button-como-funciona" href="#comece-a-usar">Como funciona</button>
            </div>    

        </div>
    </div>

    <section id="recursos"></section>
    <section id="comece-a-usar"></section>
    <section id="sobre-nos"></section>
</body>
</html>
